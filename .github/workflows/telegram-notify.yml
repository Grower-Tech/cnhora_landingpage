name: Telegram Commit Notify - Landing Page

on:
  push:
    branches:
      - dev
      - main

jobs:
  notify:
    name: Notificar equipe no Telegram
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Teste mínimo de envio para Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Iniciando teste mínimo..."
          
          # Check if jq is available
          if ! command -v jq &> /dev/null; then
            echo "❌ jq is not installed"
            exit 1
          fi
          
          # Monta o JSON de forma segura usando jq
          JSON=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "Teste mínimo do GitHub Actions - Landing Page\n\nFuncionou! ✅" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON")
          
          # Extract HTTP code (last line) and body (all but last line)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Resposta: $BODY"
          
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "✅ Mensagem enviada com sucesso!"
          else
            echo "❌ Falha no envio"
            exit 1
          fi
