name: Telegram Commit Notify - Landing Page

on:
  push:
    branches:
      - dev
      - main

jobs:
  notify:
    name: Notificar equipe no Telegram
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Teste mínimo Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== DEBUG TELEGRAM ==="
          echo "BOT_TOKEN length : ${#BOT_TOKEN}"
          echo "CHAT_ID           : '$CHAT_ID'"
          echo "======================"

          sudo apt-get update -qq && sudo apt-get install -y jq

          echo "Montando JSON..."
          JSON=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "Teste mínimo - Landing Page" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')

          echo "JSON montado. Enviando curl..."

          # Curl com máximo de debug possível
          curl -v -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON"

          echo "Curl finalizado com código: $?"
